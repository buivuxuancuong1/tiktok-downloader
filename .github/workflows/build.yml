name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install libs
      run: |
        pip install pyinstaller customtkinter yt-dlp

    - name: Build exe
      run: |
        pyinstaller --onefile --noconsole tiktok_downloader.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TikTokDownloader
        path: dist/tiktok_downloader.exe
